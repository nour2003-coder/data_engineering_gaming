services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - vbo

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 5s
      retries: 10
    networks:
      - vbo

  twitch_producer:
    build: .
    container_name: twitch_producer
    working_dir: /app
    volumes:
      - ./ingestion:/app/ingestion
      - ./config:/app/config
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      - kafka
    command: ["python", "ingestion/producers/twitch_producer.py"]
    restart: unless-stopped
    networks:
      - vbo

  postgres:
    container_name: postgres
    image: quay.io/debezium/example-postgres:2.1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    networks:
      - vbo

  twitch_processor:
    build:
      context: .
      dockerfile: Dockerfile.processor
    container_name: twitch_processor
    user: root
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./:/app
    depends_on:
      - kafka
      - postgres
    restart: unless-stopped
    command: >
      spark-submit
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.1,org.postgresql:postgresql:42.6.0
      /app/processing/streaming/twitch_stream_processor.py
    networks:
      - vbo

networks:
  vbo:
    driver: bridge

volumes:
  postgres-db-volume: